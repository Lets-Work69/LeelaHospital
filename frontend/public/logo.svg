<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- White circle background -->
  <circle cx="32" cy="32" r="32" fill="white"/>
  
  <!-- Blue border circle -->
  <circle cx="32" cy="32" r="30" fill="none" stroke="#0969b1" stroke-width="3"/>
  
  <!-- Icon: 4-petal cross, blue + teal interlocked - centered and scaled -->
  <!-- Top petal: blue -->
  <path d="M32 12 C32 12 24 12 24 20 C24 28 32 28 32 28 C32 28 40 28 40 20 C40 12 32 12 32 12Z" fill="#1d5fa4"/>
  <!-- Bottom petal: teal -->
  <path d="M32 36 C32 36 24 36 24 44 C24 52 32 52 32 52 C32 52 40 52 40 44 C40 36 32 36 32 36Z" fill="#2db89e"/>
  <!-- Left petal: teal -->
  <path d="M12 32 C12 32 12 24 20 24 C28 24 28 32 28 32 C28 32 28 40 20 40 C12 40 12 32 12 32Z" fill="#2db89e"/>
  <!-- Right petal: blue -->
  <path d="M36 32 C36 32 36 24 44 24 C52 24 52 32 52 32 C52 32 52 40 44 40 C36 40 36 32 36 32Z" fill="#1d5fa4"/>
  <!-- Center overlap teal -->
  <rect x="24" y="28" width="16" height="8" rx="1" fill="#2db89e" opacity="0.7"/>
  <!-- Center overlap blue -->
  <rect x="26" y="24" width="12" height="16" rx="1" fill="#1d5fa4" opacity="0.7"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="5" fill="#1a4f88"/>
</svg>
